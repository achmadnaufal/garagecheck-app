name: GarageCheck
options:
  bundleIdPrefix: com.naufal
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    PRODUCT_BUNDLE_IDENTIFIER: com.naufal.garagecheck
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  GarageCheck:
    type: application
    platform: iOS
    sources:
      - path: GarageCheck
        excludes:
          - "**/*.md"
    resources:
      - path: GarageCheck/Data/indonesian_cars.json
    info:
      path: GarageCheck/Info.plist
      properties:
        CFBundleDisplayName: GarageCheck
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSCameraUsageDescription: "GarageCheck uses the camera to scan your garage with AR."
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        INFOPLIST_FILE: GarageCheck/Info.plist
    dependencies:
      - framework: ARKit.framework
        embed: false
      - framework: RealityKit.framework
        embed: false
      - framework: RoomPlan.framework
        embed: false

  GarageCheckTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GarageCheckTests
    settings:
      base:
        INFOPLIST_FILE: GarageCheckTests/Info.plist
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/GarageCheck.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/GarageCheck"
    dependencies:
      - target: GarageCheck
